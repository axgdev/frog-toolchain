name: Build Toolchains

permissions:
  contents: write

on:
  release:
    types: [created]

jobs:
  build-alpine:
    name: Build (${{ matrix.channel }}-alpine-3.23-${{ matrix.host_arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: edge
            config_file: .config
            host_arch: x86_64
            runs_on: ubuntu-22.04
          - channel: edge
            config_file: .config
            host_arch: arm64
            runs_on: ubuntu-22.04-arm
          - channel: stable
            config_file: .config.stable-v1.0.0
            host_arch: x86_64
            runs_on: ubuntu-22.04
          - channel: stable
            config_file: .config.stable-v1.0.0
            host_arch: arm64
            runs_on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Normalize CI config
        run: |
          cp "${{ matrix.config_file }}" .config
          if grep -q 'CT_LOAD=$(JOBS)' Makefile; then
            sed -i 's/CT_LOAD=$(JOBS)/CT_LOAD=\\"$(JOBS)\\"/g' Makefile
          fi
          sed -i 's/# CT_STATIC_TOOLCHAIN is not set/CT_STATIC_TOOLCHAIN=y/' .config

      - name: Cache tarballs
        uses: actions/cache@v4
        with:
          path: .tarballs
          key: tarballs-${{ matrix.channel }}-${{ runner.os }}-${{ runner.arch }}-alpine-3.23-${{ hashFiles('.config') }}

      - name: Read versions
        id: vers
        run: |
          gcc_ver=$(sed -n 's/^CT_GCC_VERSION="\(.*\)"/\1/p' .config)
          if [ -z "$gcc_ver" ]; then
            gcc_ver=$(sed -n 's/^CT_CC_GCC_VERSION="\(.*\)"/\1/p' .config)
          fi
          bin_ver=$(sed -n 's/^CT_BINUTILS_VERSION="\(.*\)"/\1/p' .config)
          newlib_ver=$(sed -n 's/^CT_LIBC_NEWLIB_VERSION="\(.*\)"/\1/p' .config)
          if [ -z "$newlib_ver" ]; then
            newlib_ver=$(sed -n 's/^CT_NEWLIB_VERSION="\(.*\)"/\1/p' .config)
          fi
          echo "gcc=$gcc_ver" >> "$GITHUB_OUTPUT"
          echo "binutils=$bin_ver" >> "$GITHUB_OUTPUT"
          echo "newlib=$newlib_ver" >> "$GITHUB_OUTPUT"

      - name: Build and pack toolchain
        run: |
          name="toolchain-${{ matrix.channel }}-static-${{ matrix.host_arch }}-gcc${{ steps.vers.outputs.gcc }}-binutils${{ steps.vers.outputs.binutils }}-newlib${{ steps.vers.outputs.newlib }}.tar.xz"
          docker run --rm \
            -e ARTIFACT_NAME="$name" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            alpine:3.23 \
            /bin/sh -c '
              apk add --no-cache make &&
              make install-deps-alpine &&
              if grep -q "^install-ctng:" Makefile; then
                make install-ctng SUDO=
              fi &&
              adduser -D -h /home/builder builder &&
              chown -R builder:builder /workspace &&
              su -s /bin/sh builder -c "make toolchain" &&
              make pack ARTIFACT_NAME="$ARTIFACT_NAME"
            '
          echo "ARTIFACT_NAME=$name" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}

  release:
    name: Publish Release
    needs: build-alpine
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Read versions
        id: vers
        run: |
          gcc_ver=$(sed -n 's/^CT_GCC_VERSION="\(.*\)"/\1/p' .config)
          if [ -z "$gcc_ver" ]; then
            gcc_ver=$(sed -n 's/^CT_CC_GCC_VERSION="\(.*\)"/\1/p' .config)
          fi
          bin_ver=$(sed -n 's/^CT_BINUTILS_VERSION="\(.*\)"/\1/p' .config)
          newlib_ver=$(sed -n 's/^CT_LIBC_NEWLIB_VERSION="\(.*\)"/\1/p' .config)
          if [ -z "$newlib_ver" ]; then
            newlib_ver=$(sed -n 's/^CT_NEWLIB_VERSION="\(.*\)"/\1/p' .config)
          fi
          echo "gcc=$gcc_ver" >> "$GITHUB_OUTPUT"
          echo "binutils=$bin_ver" >> "$GITHUB_OUTPUT"
          echo "newlib=$newlib_ver" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: toolchains-${{ env.TAG_NAME }}-stable-edge-static-x86_64-arm64
          draft: ${{ github.event.release.draft || false }}
          prerelease: ${{ github.event.release.prerelease || false }}
          files: dist/**/toolchain-*.tar.xz
