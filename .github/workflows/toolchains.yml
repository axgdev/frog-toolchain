name: Build Toolchains

permissions:
  contents: write

on:
  release:
    types: [created]

jobs:
  build-ubuntu:
    name: Build (ubuntu-24.04-${{ matrix.host_arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host_arch: x86_64
            runs_on: ubuntu-24.04
          - host_arch: arm64
            runs_on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          make install-deps-ubuntu
          make install-ctng

      - name: Cache tarballs
        uses: actions/cache@v4
        with:
          path: .tarballs
          key: tarballs-${{ runner.os }}-${{ runner.arch }}-ubuntu-${{ hashFiles('.config') }}

      - name: Read versions
        id: vers
        run: |
          gcc_ver=$(sed -n 's/^CT_GCC_VERSION="\(.*\)"/\1/p' .config)
          if [ -z "$gcc_ver" ]; then
            gcc_ver=$(sed -n 's/^CT_CC_GCC_VERSION="\(.*\)"/\1/p' .config)
          fi
          bin_ver=$(sed -n 's/^CT_BINUTILS_VERSION="\(.*\)"/\1/p' .config)
          newlib_ver=$(sed -n 's/^CT_LIBC_NEWLIB_VERSION="\(.*\)"/\1/p' .config)
          if [ -z "$newlib_ver" ]; then
            newlib_ver=$(sed -n 's/^CT_NEWLIB_VERSION="\(.*\)"/\1/p' .config)
          fi
          echo "gcc=$gcc_ver" >> "$GITHUB_OUTPUT"
          echo "binutils=$bin_ver" >> "$GITHUB_OUTPUT"
          echo "newlib=$newlib_ver" >> "$GITHUB_OUTPUT"

      - name: Build toolchain
        run: make toolchain

      - name: Pack toolchain
        run: |
          name="toolchain-ubuntu-24.04-${{ matrix.host_arch }}-gcc${{ steps.vers.outputs.gcc }}-binutils${{ steps.vers.outputs.binutils }}-newlib${{ steps.vers.outputs.newlib }}.tar.xz"
          make pack ARTIFACT_NAME="$name"
          echo "ARTIFACT_NAME=$name" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}

  build-alpine:
    name: Build (alpine-3.23-${{ matrix.host_arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host_arch: x86_64
            runs_on: ubuntu-24.04
          - host_arch: arm64
            runs_on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Cache tarballs
        uses: actions/cache@v4
        with:
          path: .tarballs
          key: tarballs-${{ runner.os }}-${{ runner.arch }}-alpine-${{ hashFiles('.config') }}

      - name: Read versions
        id: vers
        run: |
          gcc_ver=$(sed -n 's/^CT_GCC_VERSION="\(.*\)"/\1/p' .config)
          if [ -z "$gcc_ver" ]; then
            gcc_ver=$(sed -n 's/^CT_CC_GCC_VERSION="\(.*\)"/\1/p' .config)
          fi
          bin_ver=$(sed -n 's/^CT_BINUTILS_VERSION="\(.*\)"/\1/p' .config)
          newlib_ver=$(sed -n 's/^CT_LIBC_NEWLIB_VERSION="\(.*\)"/\1/p' .config)
          if [ -z "$newlib_ver" ]; then
            newlib_ver=$(sed -n 's/^CT_NEWLIB_VERSION="\(.*\)"/\1/p' .config)
          fi
          echo "gcc=$gcc_ver" >> "$GITHUB_OUTPUT"
          echo "binutils=$bin_ver" >> "$GITHUB_OUTPUT"
          echo "newlib=$newlib_ver" >> "$GITHUB_OUTPUT"

      - name: Build and pack toolchain
        run: |
          name="toolchain-alpine-3.23-${{ matrix.host_arch }}-gcc${{ steps.vers.outputs.gcc }}-binutils${{ steps.vers.outputs.binutils }}-newlib${{ steps.vers.outputs.newlib }}.tar.xz"
          docker run --rm \
            -e ARTIFACT_NAME="$name" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            alpine:3.23 \
            /bin/sh -c '
              apk add --no-cache make &&
              make install-deps-alpine &&
              make install-ctng SUDO= &&
              adduser -D -h /home/builder builder &&
              chown -R builder:builder /workspace &&
              su -s /bin/sh builder -c "make toolchain" &&
              make pack ARTIFACT_NAME="$ARTIFACT_NAME"
            '
          echo "ARTIFACT_NAME=$name" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}

  release:
    name: Publish Release
    needs:
      - build-ubuntu
      - build-alpine
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Read versions
        id: vers
        run: |
          gcc_ver=$(sed -n 's/^CT_GCC_VERSION="\(.*\)"/\1/p' .config)
          if [ -z "$gcc_ver" ]; then
            gcc_ver=$(sed -n 's/^CT_CC_GCC_VERSION="\(.*\)"/\1/p' .config)
          fi
          bin_ver=$(sed -n 's/^CT_BINUTILS_VERSION="\(.*\)"/\1/p' .config)
          newlib_ver=$(sed -n 's/^CT_LIBC_NEWLIB_VERSION="\(.*\)"/\1/p' .config)
          if [ -z "$newlib_ver" ]; then
            newlib_ver=$(sed -n 's/^CT_NEWLIB_VERSION="\(.*\)"/\1/p' .config)
          fi
          echo "gcc=$gcc_ver" >> "$GITHUB_OUTPUT"
          echo "binutils=$bin_ver" >> "$GITHUB_OUTPUT"
          echo "newlib=$newlib_ver" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: toolchains-${{ env.TAG_NAME }}-gcc${{ steps.vers.outputs.gcc }}-binutils${{ steps.vers.outputs.binutils }}-newlib${{ steps.vers.outputs.newlib }}-ubuntu24.04-alpine3.23-x86_64-arm64
          draft: ${{ github.event.release.draft || false }}
          prerelease: ${{ github.event.release.prerelease || false }}
          files: dist/**/toolchain-*.tar.xz
